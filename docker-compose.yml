name: my-llm

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-llm-backend
    restart: unless-stopped
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./export:/app/export
      - ./tokenizer:/app/tokenizer
      - ./finetune/checkpoints:/app/finetune/checkpoints
      - ./frontend:/app/frontend
    environment:
      - LORA_PATH=${LORA_PATH:-}
    ports:
      - "3001:3001"     # API
      - "8080:8080"     # Frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s